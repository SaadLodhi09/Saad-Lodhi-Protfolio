backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Portfolio Content"
    files:
      - file: "content/data.json"
        label: "Everything (Photos, Text, Work, Socials)"
        name: "data"
        fields:
          - { label: "Hero Photo (cutout, transparent PNG)", name: "hero_photo", widget: "image", required: false }
          - { label: "About Section Photo", name: "about_photo", widget: "image", required: false }

          - label: "Page Text (leave blank to hide that line entirely)"
            name: "site_text"
            widget: "object"
            fields:
              - { label: "Hero Badge", name: "hero_badge", widget: "string", required: false }
              - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string", required: false }
              - { label: "Hero Subtitle", name: "hero_sub", widget: "text", required: false }
              - { label: "Tools Heading", name: "tools_heading", widget: "string", required: false }
              - { label: "Tools Subtitle", name: "tools_sub", widget: "text", required: false }
              - { label: "Skills Eyebrow", name: "skills_eyebrow", widget: "string", required: false }
              - { label: "Skills Heading", name: "skills_heading", widget: "string", required: false }
              - { label: "Skills Subtitle", name: "skills_sub", widget: "text", required: false }
              - { label: "Work Heading", name: "work_heading", widget: "string", required: false }
              - { label: "Work Subtitle", name: "work_sub", widget: "text", required: false }
              - { label: "Pitch Deck Eyebrow", name: "pitch_eyebrow", widget: "string", required: false }
              - { label: "Pitch Deck Heading", name: "pitch_heading", widget: "string", required: false }
              - { label: "Pitch Deck Subtitle", name: "pitch_sub", widget: "text", required: false }
              - { label: "About Eyebrow", name: "about_eyebrow", widget: "string", required: false }
              - { label: "About Heading", name: "about_heading", widget: "string", required: false }
              - { label: "Contact Eyebrow", name: "contact_eyebrow", widget: "string", required: false }
              - { label: "Contact Heading", name: "contact_heading", widget: "string", required: false }
              - { label: "Contact Subtitle", name: "contact_sub", widget: "text", required: false }

          - { label: "Bio Paragraph 1", name: "bio1", widget: "text" }
          - { label: "Bio Paragraph 2", name: "bio2", widget: "text" }
          - { label: "Bio Paragraph 3", name: "bio3", widget: "text" }

          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Fiverr URL", name: "fiverr", widget: "string", required: false }
              - { label: "Fiverr Icon (optional)", name: "fiverr_icon", widget: "image", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Instagram Icon (optional)", name: "instagram_icon", widget: "image", required: false }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
              - { label: "LinkedIn Icon (optional)", name: "linkedin_icon", widget: "image", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Facebook Icon (optional)", name: "facebook_icon", widget: "image", required: false }
              - { label: "WhatsApp Link (wa.me/...)", name: "whatsapp", widget: "string", required: false }
              - { label: "WhatsApp Icon (optional)", name: "whatsapp_icon", widget: "image", required: false }
              - { label: "Upwork URL", name: "upwork", widget: "string", required: false }
              - { label: "Upwork Icon (optional)", name: "upwork_icon", widget: "image", required: false }
              - { label: "Email Address", name: "email", widget: "string", required: false }
              - { label: "Email Icon (optional)", name: "email_icon", widget: "image", required: false }

          - label: "Tools & Software (icons only, floating in the ticker)"
            name: "tools"
            widget: "list"
            required: false
            summary: "{{name}}"
            fields:
              - { label: "Tool Name", name: "name", widget: "string" }
              - { label: "Tool Icon", name: "icon", widget: "image" }

          - label: "Skills / Specialties Cards"
            name: "skills"
            widget: "list"
            required: false
            summary: "{{title}}"
            fields:
              - { label: "Small Tag (e.g. Cinematic)", name: "genre", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "About Stats (e.g. 5+ / Years Experience)"
            name: "stats"
            widget: "list"
            required: false
            summary: "{{number}} — {{label}}"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

          - label: "Portfolio Projects"
            name: "projects"
            widget: "list"
            summary: "{{title}} — {{category}}"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Subtitle (short line under the title)", name: "subtitle", widget: "string", required: false }
              - { label: "Details (smaller description text)", name: "details", widget: "text", required: false }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Posters", value: "posters" }
                  - { label: "Social Media", value: "social" }
                  - { label: "Pitch Decks", value: "decks" }
                  - { label: "Film", value: "film" }
              - { label: "Project Image", name: "image", widget: "image" }
              - { label: "Show in top slideshow?", name: "featured", widget: "boolean", default: false }

          - label: "Pitch Deck Showcase (separate horizontal gallery)"
            name: "pitch_decks"
            widget: "list"
            required: false
            summary: "{{title}}"
            fields:
              - { label: "Title (optional)", name: "title", widget: "string", required: false }
              - { label: "Slide Image", name: "image", widget: "image" }

          - label: "Certifications Section"
            name: "certifications"
            widget: "list"
            required: false
            summary: "{{cert_no}} — {{title}} ({{provider}})"
            fields:
              - { label: "Cert Number (e.g. CERT 01)", name: "cert_no", widget: "string" }
              - { label: "Certificate Title", name: "title", widget: "string" }
              - { label: "Provider / Organization (e.g. HackerRank)", name: "provider", widget: "string" }
              - { label: "Details (Description of certificate achievements)", name: "details", widget: "text", required: false }
              - { label: "Year Earned (e.g. 2025)", name: "year", widget: "string" }
              - { label: "Verification URL / Link", name: "url", widget: "string", required: false }
              - { label: "Certificate Image (scanned preview)", name: "image", widget: "image" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "BUSINESS", value: "business" }
                  - { label: "ARTIFICIAL INTELLIGENCE", value: "artificial_intelligence" }
                  - { label: "DESIGN AND EDITING", value: "design_editing" }
                  - { label: "CYBER SECURITY", value: "cyber_security" }
